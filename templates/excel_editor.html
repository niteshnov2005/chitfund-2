<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Editor</title>
    <script src="https://bossanova.uk/jspreadsheet/v4/jexcel.js"></script>
    <script src="https://jsuites.net/v4/jsuites.js"></script>
    <!-- Add Formula Parser Explicitly -->
    <script src="https://bossanova.uk/jformulaparser/v2/jformula.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://bossanova.uk/jspreadsheet/v4/jexcel.css" type="text/css" />
    <link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css" />
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --green: #2ecc71;
            --red: #e74c3c;
        }

        /* Dark Mode Variables Override */
        body.dark-mode {
            --primary: #ecf0f1;
            --accent: #3498db;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ecf0f1;
            --text-muted: #b0bec5;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        .header {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: background 0.3s;
        }

        body.dark-mode .header {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            background: rgba(30, 30, 30, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .theme-toggle {
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-muted);
            transition: transform 0.3s, color 0.3s;
            display: inline-flex;
            align-items: center;
            margin-left: 10px;
        }

        .theme-toggle:hover {
            color: var(--primary);
            transform: scale(1.1) rotate(15deg);
        }

        .btn-save {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2);
        }

        .btn-back {
            background: transparent;
            color: var(--primary);
            border: 1px solid #ddd;
        }

        .btn-back:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ff7675 0%, #d63031 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.2);
        }

        select {
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid transparent;
            background: rgba(0, 0, 0, 0.05);
            font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--primary);
            outline: none;
            transition: all 0.3s;
            cursor: pointer;
        }

        body.dark-mode select {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        select:focus {
            background: white;
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.1);
        }

        #spreadsheet {
            margin: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
            transition: background 0.3s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Jspreadsheet Overrides */
        .jexcel {
            font-family: 'Outfit', sans-serif !important;
        }

        .jexcel tbody td {
            font-size: 0.95rem !important;
        }

        .jexcel thead td {
            font-weight: 600 !important;
            color: var(--text-muted) !important;
            background: var(--bg) !important;
        }

        /* Dark Mode fixes for Jspreadsheet */
        body.dark-mode .jexcel>tbody>tr>td {
            background-color: var(--card-bg);
            color: var(--text-main);
            border-color: #444;
        }

        body.dark-mode .jexcel>thead>tr>td {
            background-color: var(--card-bg) !important;
            color: var(--text-muted) !important;
            border-color: #444;
        }

        body.dark-mode .jexcel_corner {
            background-color: var(--card-bg) !important;
            border-color: #444;
        }

        body.dark-mode .jexcel>tbody>tr>td.readonly {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
        }

        #status {
            margin-left: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 5px 15px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .status-saving {
            color: var(--orange);
            background: rgba(243, 156, 18, 0.1);
        }

        .status-saved {
            color: var(--green);
            background: rgba(46, 204, 113, 0.1);
        }

        .status-error {
            color: var(--red);
            background: rgba(231, 76, 60, 0.1);
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="controls">
            <a href="/dashboard" class="btn btn-back"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <select id="sheetSelect" onchange="loadSheet()"></select>
            <button class="btn btn-save" onclick="saveData()"><i class="fas fa-save"></i> Save Changes</button>
            <button class="btn btn-delete" onclick="deleteSheet()"><i class="fas fa-trash-alt"></i> Delete
                Sheet</button>
            <span id="status"></span>
        </div>
        <div
            style="font-weight:700; color:var(--accent); font-size: 1.2rem; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-table"></i> Live Editor
        </div>
    </div>

    <div id="spreadsheet"></div>

    <script>
        let mySpreadsheet = null;
        let pendingChanges = [];

        // 1. Load Sheets
        fetch('/api/sheets')
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById('sheetSelect');
                data.sheets.forEach(sheet => {
                    const opt = document.createElement('option');
                    opt.value = sheet;
                    opt.innerText = sheet;
                    select.appendChild(opt);
                });
                // Default to first sheet (index 0)
                if (data.sheets.length > 0) {
                    select.selectedIndex = 0;
                    loadSheet();
                }
            });

        function loadSheet() {
            const sheet = document.getElementById('sheetSelect').value;
            document.getElementById('spreadsheet').innerHTML = 'Loading...';
            pendingChanges = [];

            fetch(`/api/sheet_data?sheet=${encodeURIComponent(sheet)}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('spreadsheet').innerHTML = '';

                    // Initialize Jspreadsheet
                    mySpreadsheet = jspreadsheet(document.getElementById('spreadsheet'), {
                        data: data.data,
                        search: true,
                        // pagination: 20, // REMOVED pagination to allow scrolling
                        columns: data.data[0].map(() => ({ type: 'text', width: 100 })),
                        defaultColWidth: 100,
                        tableOverflow: true,
                        tableWidth: '100%', // Enable horizontal scrolling
                        tableHeight: '80vh', // Adjust height
                        parseFormulas: true, // Evaluate formulas since backend sends formula strings
                        wordWrap: true,
                        onchange: function (instance, cell, x, y, value) {
                            pendingChanges.push({ x: parseInt(x), y: parseInt(y), value: value });
                        }
                    });
                })
                .catch(err => {
                    document.getElementById('spreadsheet').innerHTML = 'Error loading sheet: ' + err;
                });
        }

        function deleteSheet() {
            const sheet = document.getElementById('sheetSelect').value;
            if (!sheet) return;

            if (!confirm(`Are you sure you want to delete the sheet "${sheet}"? This action cannot be undone.`)) {
                return;
            }

            fetch('/api/delete_sheet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sheet_name: sheet })
            })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        alert('Sheet deleted successfully!');
                        refreshSheets();
                    } else {
                        alert('Error: ' + res.error);
                    }
                })
                .catch(err => alert('Network Error'));
        }

        function refreshSheets() {
            fetch('/api/sheets')
                .then(res => res.json())
                .then(data => {
                    const select = document.getElementById('sheetSelect');
                    select.innerHTML = '';
                    data.sheets.forEach(sheet => {
                        const opt = document.createElement('option');
                        opt.value = sheet;
                        opt.innerText = sheet;
                        select.appendChild(opt);
                    });
                    if (data.sheets.length > 0) {
                        select.selectedIndex = 0;
                        loadSheet();
                    } else {
                        document.getElementById('spreadsheet').innerHTML = 'No sheets available.';
                    }
                });
        }

        function saveData() {
            const status = document.getElementById('status');
            if (!mySpreadsheet) return;

            status.innerText = 'Saving...';
            status.className = 'status-saving';

            const sheet = document.getElementById('sheetSelect').value;

            fetch('/api/save_sheet_data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sheet_name: sheet, changes: pendingChanges })
            })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        status.innerText = 'All changes saved!';
                        status.className = 'status-saved';
                        pendingChanges = [];
                        setTimeout(() => status.innerText = '', 3000);
                    } else {
                        status.innerText = 'Error: ' + res.error;
                        status.className = 'status-error';
                    }
                })
                .catch(err => {
                    status.innerText = 'Network Error';
                    status.className = 'status-error';
                });
        }

        // --- Dark Theme Toggle Logic ---
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('#themeIcon i');

            if (document.body.classList.contains('dark-mode')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            const icon = document.querySelector('#themeIcon i');
            if (icon) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        }
    </script>

</body>

</html>
