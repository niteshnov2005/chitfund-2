<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --green: #2ecc71;
            --red: #e74c3c;
            --orange: #f39c12;
        }

        /* Dark Mode Variables Override */
        body.dark-mode {
            --primary: #ecf0f1;
            --accent: #3498db;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ecf0f1;
            --text-muted: #b0bec5;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            padding: 30px 20px;
            margin: 0;
            animation: slideUp 0.6s ease-out;
            transition: background 0.3s, color 0.3s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }

        .print-btn {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .print-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .controls {
            background: var(--card-bg);
            padding: 20px 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border-top: 3px solid var(--accent);
        }

        .controls label {
            font-weight: 600;
            color: var(--text-muted);
        }

        select {
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 30px;
            border: 2px solid transparent;
            background: #f0f2f5;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--primary);
            outline: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:focus {
            background: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.1);
        }

        h2 {
            border-left: 5px solid var(--green);
            padding-left: 15px;
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .pending-title {
            border-left-color: var(--red);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        th {
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 2px solid #eee;
            font-weight: 600;
            color: var(--text-muted);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f5f6fa;
            font-weight: 400;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .amount {
            font-weight: 700;
            text-align: right;
            font-size: 1.05rem;
        }

        .date {
            color: var(--green);
            font-weight: 600;
            font-size: 0.9em;
            background: rgba(46, 204, 113, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .summary-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
        }

        .stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }

        .stat:nth-child(1)::before {
            background: var(--green);
        }

        .stat:nth-child(2)::before {
            background: var(--red);
        }

        .stat:nth-child(3)::before {
            background: var(--accent);
        }

        .stat-val {
            font-size: 2.2rem;
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .btn-back {
            color: var(--text-muted);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-back:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }

        .theme-toggle {
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-muted);
            margin-right: 15px;
            transition: transform 0.3s, color 0.3s;
            display: inline-flex;
            align-items: center;
        }

        .theme-toggle:hover {
            color: var(--primary);
            transform: scale(1.1) rotate(15deg);
        }

        @media print {

            .print-btn,
            .controls,
            .btn-back {
                display: none;
            }

            body {
                padding: 0;
                background: white;
            }

            .stat {
                box-shadow: none;
                border: 1px solid #eee;
            }

            table {
                box-shadow: none;
                border: 1px solid #eee;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <div>
                <a href="/dashboard" class="btn-back"><i class="fas fa-arrow-left" style="margin-right:5px;"></i>
                    Dashboard</a>
                <h1>Monthly Auction Report</h1>
            </div>
            <button class="print-btn" onclick="window.print()"><i class="fas fa-print" style="margin-right:8px;"></i>
                Print Report</button>
        </div>

        <div class="controls">
            <label>Select Month:</label>
            <select id="sheetSelect" onchange="loadReport()">
                {% for sheet in sheets %}
                <option value="{{ sheet }}">{{ sheet }}</option>
                {% endfor %}
            </select>
            <span id="loading" style="color:#777; display:none;">Loading...</span>
        </div>

        <div class="summary-box">
            <div class="stat">
                <span class="stat-val" id="total-collected" style="color:#2ecc71">₹0</span>
                <span class="stat-label">Total Collected</span>
            </div>
            <div class="stat">
                <span class="stat-val" id="total-pending" style="color:#e74c3c">₹0</span>
                <span class="stat-label">Total Pending</span>
            </div>
            <div class="stat">
                <span class="stat-val" id="total-value" style="color:#3498db">₹0</span>
                <span class="stat-label">Total Value</span>
            </div>
        </div>

        <h2 class="pending-title">⚠️ Pending Payments</h2>
        <table>
            <thead>
                <tr>
                    <th>Member Name</th>
                    <th>Area</th>
                    <th style="text-align:right">Amount</th>
                </tr>
            </thead>
            <tbody id="pending-list"></tbody>
        </table>

        <h2>✅ Payment History</h2>
        <table>
            <thead>
                <tr>
                    <th>Member Name</th>
                    <th>Area</th>
                    <th>Paid On</th>
                    <th style="text-align:right">Amount</th>
                </tr>
            </thead>
            <tbody id="paid-list"></tbody>
        </table>

    </div>

    <script>
        function loadReport() {
            const sheet = document.getElementById('sheetSelect').value;
            const loader = document.getElementById('loading');
            loader.style.display = 'inline';

            fetch(`/api/members?sheet=${encodeURIComponent(sheet)}`)
                .then(res => res.json())
                .then(responseData => {
                    loader.style.display = 'none';
                    // Handle API structure change: check if data is array or object
                    const members = Array.isArray(responseData) ? responseData : (responseData.members || []);
                    renderTables(members);
                })
                .catch(err => {
                    console.error(err);
                    loader.innerText = 'Error loading data';
                });
        }

        function renderTables(members) {
            const pendingList = document.getElementById('pending-list');
            const paidList = document.getElementById('paid-list');

            let pendingHtml = '';
            let paidHtml = '';

            let sumPending = 0;
            let sumPaid = 0;

            members.forEach(m => {
                if (m.total <= 0) return; // Skip zero/negative amounts

                if (m.is_paid) {
                    sumPaid += m.total;
                    const date = m.paid_date ? m.paid_date : 'Paid (No Date)';
                    paidHtml += `<tr>
                    <td>${m.name}</td>
                    <td>${m.area}</td>
                    <td class="date">${date}</td>
                    <td class="amount">₹${m.total.toLocaleString()}</td>
                </tr>`;
                } else {
                    sumPending += m.total;
                    pendingHtml += `<tr>
                    <td>${m.name}</td>
                    <td>${m.area}</td>
                    <td class="amount">₹${m.total.toLocaleString()}</td>
                </tr>`;
                }
            });

            if (!pendingHtml) pendingHtml = '<tr><td colspan="3" style="text-align:center; color:#aaa;">No pending payments! 🎉</td></tr>';
            if (!paidHtml) paidHtml = '<tr><td colspan="4" style="text-align:center; color:#aaa;">No payments recorded yet.</td></tr>';

            pendingList.innerHTML = pendingHtml;
            paidList.innerHTML = paidHtml;

            document.getElementById('total-pending').innerText = '₹' + sumPending.toLocaleString();
            document.getElementById('total-collected').innerText = '₹' + sumPaid.toLocaleString();
            document.getElementById('total-value').innerText = '₹' + (sumPending + sumPaid).toLocaleString();
        }

        // Load default on start
        loadReport();

        // --- Dark Theme Toggle Logic ---
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('#themeIcon i');

            if (document.body.classList.contains('dark-mode')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            const icon = document.querySelector('#themeIcon i');
            if (icon) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        }
    </script>
</body>

</html>
