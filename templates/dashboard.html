<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chit Fund Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
        }

        /* Dark Mode Variables Override */
        body.dark-mode {
            --primary: #ecf0f1;
            --accent: #3498db;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ecf0f1;
            --text-muted: #b0bec5;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s, margin-left .3s;
            overflow-x: hidden;
        }

        /* --- 1. HEADER & MENU BUTTON --- */
        .header {
            background: var(--card-bg);
            /* Use card-bg instead of hardcoded white */
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            /* Shadow remains subtle */
            position: sticky;
            top: 0;
            z-index: 10;
            transition: background 0.3s;
        }

        /* Needs stronger contrast for header shadow in dark mode */
        body.dark-mode .header {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            background: rgba(30, 30, 30, 0.9);
        }

        .menu-btn {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary);
            background: none;
            border: none;
            transition: transform 0.2s, color 0.3s;
        }

        .menu-btn:hover {
            transform: scale(1.1);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-left: 15px;
            letter-spacing: 0.5px;
        }

        .theme-toggle {
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--primary);
            margin-right: 15px;
            transition: transform 0.3s, color 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
        }

        /* --- 2. SLIDING SIDEBAR --- */
        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 100;
            top: 0;
            left: 0;
            background: linear-gradient(180deg, #1a252f 0%, #2c3e50 100%);
            overflow-x: hidden;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding-top: 60px;
            box-shadow: 10px 0 25px rgba(0, 0, 0, 0.2);
        }

        .sidenav a {
            padding: 16px 25px;
            text-decoration: none;
            font-size: 1.1rem;
            color: #bdc3c7;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            white-space: nowrap;
            border-left: 4px solid transparent;
        }

        .sidenav a:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-left: 4px solid var(--accent);
            padding-left: 30px;
        }

        .sidenav .closebtn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 2.5rem;
            color: #7f8c8d;
            background: none;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .sidenav .closebtn:hover {
            color: white;
            transform: rotate(90deg);
        }

        /* Overlay */
        #overlay {
            position: fixed;
            display: none;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(3px);
            z-index: 50;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* --- 3. DASHBOARD CONTENT --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-top: 4px solid var(--accent);
            position: relative;
            overflow: hidden;
            animation: cardEntrance 0.6s backwards;
        }

        .card:nth-child(1) {
            animation-delay: 0.1s;
            border-top-color: #9b59b6;
        }

        .card:nth-child(2) {
            animation-delay: 0.2s;
            border-top-color: #2ecc71;
        }

        .card:nth-child(3) {
            animation-delay: 0.3s;
            border-top-color: #e74c3c;
        }

        .card:nth-child(4) {
            animation-delay: 0.4s;
            border-top-color: #f1c40f;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 100%);
            opacity: 0.5;
            pointer-events: none;
        }

        .card h3 {
            margin: 0 0 12px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .card .value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
        }

        /* Spinner for loading values */
        .loading-dots:after {
            content: ' .';
            animation: dots 1s steps(5, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                color: rgba(0, 0, 0, 0);
                text-shadow: .25em 0 0 rgba(0, 0, 0, 0), .5em 0 0 rgba(0, 0, 0, 0);
            }

            40% {
                color: #333;
                text-shadow: .25em 0 0 rgba(0, 0, 0, 0), .5em 0 0 rgba(0, 0, 0, 0);
            }

            60% {
                text-shadow: .25em 0 0 #333, .5em 0 0 rgba(0, 0, 0, 0);
            }

            80%,
            100% {
                text-shadow: .25em 0 0 #333, .5em 0 0 #333;
            }
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .btn-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s, color 0.3s;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-action::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--accent);
            opacity: 0;
            z-index: -1;
            transition: 0.3s;
            transform: scaleY(0);
            transform-origin: bottom;
        }

        .btn-action:hover {
            color: white;
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.3);
            transform: translateY(-5px);
        }

        .btn-action:hover::after {
            opacity: 1;
            transform: scaleY(1);
        }

        .btn-action i {
            font-size: 2.2rem;
            margin-bottom: 12px;
            color: var(--accent);
            transition: 0.3s;
        }

        .btn-action:hover i {
            color: white;
            transform: scale(1.1);
        }

        /* Specialized colored buttons hovering */
        .btn-action.action-green:hover::after {
            background: #2ecc71;
        }

        .btn-action.action-green:hover {
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.3);
        }

        .btn-action.action-green i {
            color: #2ecc71;
        }

        .btn-action.action-orange:hover::after {
            background: #f39c12;
        }

        .btn-action.action-orange:hover {
            box-shadow: 0 10px 25px rgba(243, 156, 18, 0.3);
        }

        .btn-action.action-orange i {
            color: #f39c12;
        }

        .btn-action span {
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .card .value {
                font-size: 1.8rem;
            }

            .header {
                padding: 15px;
            }

            .btn-action {
                padding: 25px 15px;
            }
        }
    </style>
</head>

<body>

    <div id="overlay" onclick="closeNav()"></div>

    <div class="header">
        <div style="display:flex; align-items:center;">
            <button class="menu-btn" onclick="openNav()"><i class="fas fa-bars"></i></button>
            <div class="logo">Chit Fund</div>
        </div>
        <div style="display:flex; align-items:center; gap: 15px;">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon" title="Toggle Dark/Light Mode"
                style="margin: 0;">
                <i class="fas fa-moon"></i>
            </button>
            <a href="/logout"
                style="text-decoration: none; color: #e74c3c; font-weight: 600; padding: 8px 15px; border-radius: 20px; border: 1px solid #e74c3c; transition: all 0.3s; display: flex; align-items: center; gap: 8px;"
                onmouseover="this.style.background='#e74c3c'; this.style.color='#fff';"
                onmouseout="this.style.background='transparent'; this.style.color='#e74c3c';">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </div>

    <div id="mySidenav" class="sidenav">
        <button class="closebtn" onclick="closeNav()">&times;</button>
        <div style="padding: 20px 25px; color: #7f8c8d; font-size: 0.8rem; text-transform: uppercase;">Menu</div>
        <a href="/dashboard"><i class="fas fa-home" style="width:25px;"></i> Dashboard</a>
        <a href="/members"><i class="fas fa-users" style="width:25px;"></i> Members</a>
        <a href="/reports"><i class="fas fa-chart-line" style="width:25px;"></i> Reports</a>
        <a href="/auction"><i class="fas fa-gavel" style="width:25px;"></i> Auction</a>
        <div style="border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;"></div>
        <a href="/logout" style="color: #e74c3c;"><i class="fas fa-sign-out-alt" style="width:25px;"></i> Logout</a>
    </div>

    <div class="container">
        <h1>Dashboard</h1>
        <p style="color:#777; margin-bottom:30px;">
            Overview for <strong>{{ active_sheet }}</strong>

        </p>

        <div class="stats-grid">

            <div class="card">
                <h3>Total Value</h3>
                <div class="value" id="val-total"><span class="loading-dots"></span></div>
                <div id="val-total-exact" style="font-size: 0.8rem; color: #7f8c8d; margin-top: 5px;"></div>
            </div>

            <div class="card">
                <h3>Active Members</h3>
                <div class="value" id="val-members"><span class="loading-dots"></span></div>
            </div>

            <div class="card">
                <h3>Pending Members</h3>
                <div class="value" id="val-pending"><span class="loading-dots"></span></div>
            </div>

            <div class="card">
                <h3>Next Auction (Sun)</h3>
                <div class="value" id="val-date">...</div>
            </div>
        </div>

        <h2 style="margin-bottom:20px; font-weight: 600;">Quick Actions</h2>
        <div class="actions-grid">
            <a href="/members" class="btn-action">
                <i class="fas fa-users"></i>
                <span>Member Collection</span>
            </a>
            <a href="/reports" class="btn-action">
                <i class="fas fa-chart-line"></i>
                <span>Reports</span>
            </a>
            <a href="/auction" class="btn-action">
                <i class="fas fa-gavel"></i>
                <span>Run Auction</span>
            </a>
            <a href="/excel_editor" class="btn-action action-green">
                <i class="fas fa-table"></i>
                <span>Excel Editor</span>
            </a>
            <a href="/view_receipts" target="_blank" class="btn-action action-orange">
                <i class="fas fa-receipt"></i>
                <span>View Receipts</span>
            </a>
        </div>
    </div>

    <script>
        // --- 1. Menu Animation Logic ---
        function openNav() {
            document.getElementById("mySidenav").style.width = "280px";
            document.getElementById("overlay").style.display = "block";
        }

        function closeNav() {
            document.getElementById("mySidenav").style.width = "0";
            document.getElementById("overlay").style.display = "none";
        }

        // --- 2. Auto-Calculate Next Auction Date (First Sunday of Next Month) ---
        function setNextAuctionDate() {
            const now = new Date();
            // Go to 1st day of next month
            let nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);

            // Find day of week (0=Sun, 1=Mon, etc.)
            const day = nextMonth.getDay();
            // Calculate days to add to reach Sunday (if today is Sun(0), add 0. If Mon(1), add 6.)
            const diff = (7 - day) % 7;

            nextMonth.setDate(nextMonth.getDate() + diff);

            const options = { month: 'short', day: 'numeric', year: 'numeric' };
            document.getElementById('val-date').innerText = nextMonth.toLocaleDateString('en-US', options);
        }

        // --- 3. Fetch Data from Excel to Update Dashboard ---
        function fetchStats() {
            fetch('/api/members?t=' + new Date().getTime())
                .then(response => response.json())
                .then(responseData => {
                    // Handle API change: check if data is array or object
                    const data = Array.isArray(responseData) ? responseData : (responseData.members || []);
                    const backendTotal = responseData.grand_total || 0;

                    // Count Total Members
                    const memberCount = data.length;

                    // Use the calculated total from backend for consistency with Reports
                    const totalValue = responseData.calculated_total || 0;
                    let pendingCount = 0;

                    data.forEach(m => {
                        // Count Pending: If total > 0 AND not marked as paid
                        if (m.total > 0 && !m.is_paid) {
                            pendingCount++;
                        }
                    });

                    // Format Total Value
                    // If > 100k, show in Lakhs (e.g. 88.63L), but also show full amount in tooltip
                    const lakhs = (totalValue / 100000).toFixed(2);
                    const formattedDisplay = (totalValue >= 100000) ? "₹" + lakhs + "L" : "₹" + totalValue.toLocaleString();

                    // Update UI
                    document.getElementById('val-members').innerText = memberCount;
                    document.getElementById('val-total').innerText = formattedDisplay;
                    document.getElementById('val-total').title = "Exact: ₹" + totalValue.toLocaleString();
                    document.getElementById('val-total-exact').innerText = "Exact: ₹" + totalValue.toLocaleString();
                    document.getElementById('val-pending').innerText = pendingCount;
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('val-members').innerText = "Err";
                });
        }

        // --- 4. Dark Theme Toggle Logic ---
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('#themeIcon i');

            if (document.body.classList.contains('dark-mode')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            document.querySelector('#themeIcon i').classList.replace('fa-moon', 'fa-sun');
        }

        // Initialize
        setNextAuctionDate();
        fetchStats();

    </script>

</body>

</html>
