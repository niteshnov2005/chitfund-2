<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Auction</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --green: #2ecc71;
        }

        /* Dark Mode Variables Override */
        body.dark-mode {
            --primary: #ecf0f1;
            --accent: #3498db;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ecf0f1;
            --text-muted: #b0bec5;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            padding: 40px 20px;
            margin: 0;
            animation: slideUp 0.6s ease-out;
            transition: background 0.3s, color 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.05);
            border-top: 5px solid var(--accent);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"] {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid transparent;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
            color: var(--primary);
        }

        body.dark-mode input[type="text"],
        body.dark-mode input[type="number"],
        body.dark-mode input[type="date"] {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        input:focus {
            border-color: var(--accent);
            background: var(--card-bg);
            outline: none;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.1);
        }

        /* Group Card */
        .group-item {
            background: rgba(52, 152, 219, 0.03);
            border: 1px solid rgba(52, 152, 219, 0.1);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }

        .group-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.02);
            border-color: rgba(52, 152, 219, 0.3);
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .row-inputs {
            display: flex;
            gap: 15px;
        }

        .row-inputs input {
            flex: 1;
        }

        .btn-submit {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2);
            margin-top: 10px;
            font-family: 'Outfit', sans-serif;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4);
        }

        .btn-back {
            display: block;
            text-align: left;
            margin-bottom: 30px;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-back:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .theme-toggle {
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-muted);
            transition: transform 0.3s, color 0.3s;
        }

        .theme-toggle:hover {
            color: var(--primary);
            transform: scale(1.1) rotate(15deg);
        }

        /* Mobile Stack */
        @media (max-width: 480px) {
            .row-inputs {
                flex-direction: column;
            }

            .container {
                padding: 30px 20px;
            }

            body {
                padding: 20px 15px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <a href="/dashboard" class="btn-back"><i class="fas fa-arrow-left" style="margin-right: 5px;"></i> Back to
            Dashboard</a>

        <h1><i class="fas fa-gavel" style="color:var(--accent); margin-right: 10px;"></i> Run Monthly Auction</h1>

        <form action="/run-auction-batch" method="POST">

            <div class="form-group">
                <label>Global Date (Receipt Date)</label>
                <input type="date" name="global_date" required>
            </div>

            <div class="form-group">
                <label>New Sheet Name (e.g., Dec-2025)</label>
                <input type="text" name="sheet_name" placeholder="Name for the new Excel Tab" required>
            </div>

            <hr style="border:0; border-top:1px solid #eee; margin: 25px 0;">

            {% for g in groups %}
            <div class="group-item">
                <div class="group-header">
                    <span>Month {{ g.current_month }}</span>
                    <span style="color:#2980b9;">₹{{ g.plan_display }}</span>
                </div>
                <div class="row-inputs">
                    <input type="text" name="new_month_for_{{ g.id }}" value="{{ g.current_month|int + 1 }}"
                        placeholder="New Month" required>
                    <input type="number" name="bid_for_{{ g.id }}" value="0" placeholder="Winning Bid Amount">
                </div>
            </div>
            {% endfor %}

            <button type="submit" class="btn-submit">Update Excel & Generate</button>
        </form>
    </div>

    <script>
        // --- Dark Theme Toggle Logic ---
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('#themeIcon i');

            if (document.body.classList.contains('dark-mode')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            const icon = document.querySelector('#themeIcon i');
            if (icon) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        }
    </script>
</body>

</html>
